# Docker compose for local testing of the Superwell notebook.
# Usage: docker compose up --build
# Then open the URL printed in the terminal output.
services:
  notebook:
    container_name: superwell-notebook
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/msd-live/jupyter/superwell-notebook:latest
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/notebooks
      - ./inputs:/home/jovyan/inputs
      - ./outputs:/home/jovyan/outputs
